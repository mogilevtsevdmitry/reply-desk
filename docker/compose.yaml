# ============================================================================
# ReplyDesk — полный стенд одного запуска (05-DEVOPS).
#
# Запуск из корня репозитория:
#   cp .env.example .env        # заполнить секреты (или LLM_PROVIDER=fake)
#   docker compose -f docker/compose.yaml --env-file .env up --build -d
#
# Хост-порты параметризованы env с дефолтами (ADR-027): web :3200, api :4200 —
# чтобы не конфликтовать с bare-metal dev-стендом (web :3000, api :4000).
# Наружу публикуются ТОЛЬКО web и api; БД/Redis — во внутренней сети
# (порты для отладки — в compose.dev.yaml).
# Секретов в этом файле нет — все значения приходят из env-файла.
# ============================================================================
name: replydesk

services:
  postgres:
    image: postgres:16-alpine # pg_trgm входит в поставку (расширение ставит миграция)
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-replydesk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?задай POSTGRES_PASSWORD в .env}
      POSTGRES_DB: ${POSTGRES_DB:-replydesk}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 12

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  # Одноразовый: prisma migrate deploy (+ seed при SEED_ON_START=true, ADR-028)
  migrate:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
      target: migrate
    restart: "no"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-replydesk}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:-replydesk}?schema=public
      SEED_ON_START: ${SEED_ON_START:-false}
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    env_file:
      - ${ENV_FILE:-../.env} # секреты и настройки (JWT_ACCESS_SECRET, LLM_PROVIDER, лимиты…)
    environment:
      # Перекрывает значения из env-файла — внутренняя сеть compose и прод-топология
      NODE_ENV: production
      PORT: "4000"
      DATABASE_URL: postgresql://${POSTGRES_USER:-replydesk}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:-replydesk}?schema=public
      REDIS_URL: redis://redis:6379
      WORKER_EMBEDDED: "false" # воркер — отдельный сервис (ADR-020)
      PROMPTS_DIR: /app/prompts
    ports:
      - "${API_PORT:-4200}:4000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  worker:
    build:
      context: ..
      dockerfile: docker/worker.Dockerfile
    env_file:
      - ${ENV_FILE:-../.env}
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-replydesk}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:-replydesk}?schema=public
      REDIS_URL: redis://redis:6379
      PROMPTS_DIR: /app/prompts
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G

  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
      args:
        # BUG-003: бакируется в JS при next build; при смене URL API — пересборка
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4200/api/v1}
    environment:
      NODE_ENV: production
    ports:
      - "${WEB_PORT:-3200}:3000"
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  pgdata:
